name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if secret-pattern files are tracked
        run: |
          set -e
          patterns=(
            'token\.md$'
            'token.*\.md$'
            '^\.env$'
            '\.env\.'
            'credentials.*\.json$'
            'service-account.*\.json$'
            '\.pem$'
            '\.key$'
            '^application_default_credentials\.json$'
          )
          found=0
          while IFS= read -r f; do
            for p in "${patterns[@]}"; do
              if echo "$f" | grep -qE "$p"; then
                echo "::error file=$f::Forbidden secret-pattern file tracked in git"
                found=1
              fi
            done
          done < <(git ls-files)
          if [ "$found" -eq 1 ]; then
            exit 1
          fi
          echo "No forbidden secret-pattern files in tracked files."
